<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chef Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0d;
      --surface: #1a1a16;
      --surface2: #232320;
      --border: #2e2e28;
      --border2: #3d3d36;
      --text: #f0ede4;
      --text-muted: #8a8878;
      --text-dim: #5a5a4e;
      --amber: #e8a020;
      --amber-dim: #3d2a06;
      --amber-mid: #7a4f0c;
      --green: #3ecf74;
      --green-dim: #0a2e18;
      --green-mid: #12582e;
      --red: #e84040;
      --red-dim: #2e0a0a;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-mark {
      width: 38px;
      height: 38px;
      background: var(--amber);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg { width: 20px; height: 20px; }

    .header-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .header-sub {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--green);
      background: var(--green-dim);
      border: 1px solid var(--green-mid);
      padding: 5px 10px;
      border-radius: 4px;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    .clock {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      min-width: 60px;
      text-align: right;
    }

    /* STATS BAR */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat-item {
      background: var(--surface);
      padding: 14px 24px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .stat-value {
      font-family: var(--font-mono);
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
    }

    .stat-value.amber { color: var(--amber); }
    .stat-value.green { color: var(--green); }

    /* MAIN LAYOUT */
    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: calc(100vh - 130px);
    }

    .column {
      padding: 24px;
      border-right: 1px solid var(--border);
    }

    .column:last-child { border-right: none; }

    .col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .col-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .col-title .indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .col-title .indicator.amber { background: var(--amber); }
    .col-title .indicator.green { background: var(--green); }

    .col-count {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 3px;
      border: 1px solid var(--border2);
      color: var(--text-muted);
    }

    /* ORDER CARDS */
    #pending, #completed {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      animation: slideIn 0.3s ease forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .order-card:hover {
      border-color: var(--border2);
      transform: translateY(-1px);
    }

    .order-card.completed {
      border-color: var(--border);
      opacity: 0.72;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px 10px;
      border-bottom: 1px solid var(--border);
    }

    .order-id {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--amber);
    }

    .order-id.completed { color: var(--green); }

    .order-meta {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .type-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 3px;
    }

    .type-badge.dine {
      background: #1a2e3d;
      color: #6ab4e8;
      border: 1px solid #1d4060;
    }

    .type-badge.takeaway {
      background: #2d1a3d;
      color: #b46ae8;
      border: 1px solid #3d1d60;
    }

    .order-time {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .card-body {
      padding: 12px 16px;
    }

    .customer-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
    }

    .items-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 12px;
    }

    .item-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
    }

    .item-name {
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .item-name::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 3px;
      background: var(--text-dim);
      border-radius: 50%;
    }

    .item-qty {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 3px;
      border: 1px solid var(--border);
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 12px;
      border-top: 1px solid var(--border);
    }

    .order-total {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .mark-ready-btn {
      background: var(--amber-dim);
      color: var(--amber);
      border: 1px solid var(--amber-mid);
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 7px 14px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .mark-ready-btn:hover {
      background: #5a3808;
      transform: scale(1.02);
    }

    .mark-ready-btn:active {
      transform: scale(0.97);
    }

    .mark-ready-btn svg { width: 12px; height: 12px; }

    .done-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--green);
    }

    .done-badge svg { width: 13px; height: 13px; }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-dim);
    }

    .empty-state .icon {
      font-size: 32px;
      margin-bottom: 10px;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 13px;
      letter-spacing: 0.06em;
    }

    /* ELAPSED TIME */
    .elapsed {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-dim);
      margin-left: 6px;
    }

    .elapsed.warn { color: #d4802a; }
    .elapsed.urgent { color: var(--red); animation: blink 1s step-end infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .refresh-ring {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border2);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .refresh-ring.active { opacity: 1; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 720px) {
      .main { grid-template-columns: 1fr; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .column { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0f0f0d" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 2l1.5 14h15L21 2"/>
          <path d="M6 2c0 3 2 5 6 5s6-2 6-5"/>
          <rect x="4" y="20" width="16" height="2" rx="1"/>
        </svg>
      </div>
      <div>
        <div class="header-title">Kitchen Display</div>
        <div class="header-sub">Chef Dashboard</div>
      </div>
    </div>
    <div class="header-right">
      <div id="refresh-ring" class="refresh-ring"></div>
      <div class="live-badge"><span class="live-dot"></span>Live</div>
      <div class="clock" id="clock">--:--:--</div>
    </div>
  </header>

  <!-- STATS BAR -->
  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-label">Pending</span>
      <span class="stat-value amber" id="stat-pending">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Completed</span>
      <span class="stat-value green" id="stat-completed">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Total Orders</span>
      <span class="stat-value" id="stat-total">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">Revenue</span>
      <span class="stat-value" id="stat-revenue">₹0</span>
    </div>
  </div>

  <!-- MAIN COLUMNS -->
  <div class="main">

    <!-- PENDING -->
    <div class="column">
      <div class="col-header">
        <div class="col-title">
          <span class="indicator amber"></span>
          Pending Orders
        </div>
        <span class="col-count" id="pending-count">0</span>
      </div>
      <div id="pending">
        <div class="empty-state">
          <div class="icon">◎</div>
          <p>No pending orders</p>
        </div>
      </div>
    </div>

    <!-- COMPLETED -->
    <div class="column">
      <div class="col-header">
        <div class="col-title">
          <span class="indicator green"></span>
          Completed Orders
        </div>
        <span class="col-count" id="completed-count">0</span>
      </div>
      <div id="completed">
        <div class="empty-state">
          <div class="icon">◎</div>
          <p>No completed orders</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ─── Clock ───────────────────────────────────────────────────────────────
    function updateClock() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ─── Elapsed time ────────────────────────────────────────────────────────
    function getElapsed(timeStr) {
      if (!timeStr) return null;
      const parts = timeStr.match(/(\d{1,2}):(\d{2})\s*(AM|PM)?/i);
      if (!parts) return null;
      let h = parseInt(parts[1]), m = parseInt(parts[2]);
      const ap = parts[3];
      if (ap) { if (ap.toUpperCase() === 'PM' && h !== 12) h += 12; if (ap.toUpperCase() === 'AM' && h === 12) h = 0; }
      const t = new Date(); t.setHours(h, m, 0, 0);
      const diff = Math.floor((Date.now() - t) / 60000);
      return (diff < 0 || diff > 300) ? null : diff;
    }

    function elapsedLabel(mins) {
      if (mins === null) return '';
      if (mins < 1) return '<span class="elapsed">just now</span>';
      const cls = mins >= 20 ? 'urgent' : mins >= 12 ? 'warn' : '';
      return `<span class="elapsed ${cls}">${mins}m ago</span>`;
    }

    // ─── Build card HTML (no animation class — applied separately) ───────────
    function buildCardHTML(order) {
      const isDone = order.status === 'Ready';
      const isDine = order.order_type && order.order_type.toLowerCase().includes('dine');
      const typeClass = isDine ? 'dine' : 'takeaway';
      const typeLabel = isDine ? 'Dine In' : 'Take Away';
      const elapsed = isDone ? null : getElapsed(order.time);

      const itemsHTML = order.items.map(i =>
        `<div class="item-row"><span class="item-name">${i.name}</span><span class="item-qty">×${i.quantity}</span></div>`
      ).join('');

      const footerAction = isDone
        ? `<span class="done-badge"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,8 7,12 13,4"/></svg>Ready</span>`
        : `<button class="mark-ready-btn" onclick="markReady(${order.id})"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,8 7,12 13,4"/></svg>Mark Ready</button>`;

      return `<div class="card-top">
          <span class="order-id ${isDone ? 'completed' : ''}">#${order.id}</span>
          <div class="order-meta">
            <span class="type-badge ${typeClass}">${typeLabel}</span>
            <span class="order-time">${order.time || ''}${elapsedLabel(elapsed)}</span>
          </div>
        </div>
        <div class="card-body">
          <div class="customer-name">${order.name}</div>
          <div class="items-list">${itemsHTML}</div>
        </div>
        <div class="card-footer">
          <span class="order-total">₹${order.total}</span>
          ${footerAction}
        </div>`;
    }

    // ─── Fingerprint an order to detect changes ──────────────────────────────
    function fingerprint(order) {
      return `${order.status}|${order.name}|${order.total}|${order.items.map(i=>i.name+i.quantity).join(',')}`;
    }

    // ─── State: map of orderId → { status, fingerprint } ────────────────────
    const renderedOrders = new Map(); // id → { fp, status }

    // ─── DOM-diff reconcile for one column ──────────────────────────────────
    function reconcileColumn(containerId, orders) {
      const container = document.getElementById(containerId);

      // Remove stale cards (orders no longer in this column)
      const incomingIds = new Set(orders.map(o => String(o.id)));
      container.querySelectorAll('.order-card[data-id]').forEach(el => {
        if (!incomingIds.has(el.dataset.id)) {
          // Slide out then remove
          el.style.transition = 'opacity 0.25s, transform 0.25s';
          el.style.opacity = '0';
          el.style.transform = 'translateY(-6px)';
          setTimeout(() => el.remove(), 260);
        }
      });

      // Show/hide empty state
      const emptyEl = container.querySelector('.empty-state');
      if (orders.length === 0) {
        if (!emptyEl) {
          const e = document.createElement('div');
          e.className = 'empty-state';
          e.innerHTML = '<div class="icon">◎</div><p>No ' + (containerId === 'pending' ? 'pending' : 'completed') + ' orders</p>';
          container.appendChild(e);
        }
        return;
      } else if (emptyEl) {
        emptyEl.remove();
      }

      // Insert or update each order card
      orders.forEach((order, idx) => {
        const id = String(order.id);
        const fp = fingerprint(order);
        const existing = container.querySelector(`.order-card[data-id="${id}"]`);

        if (!existing) {
          // Brand-new card — create and animate in
          const el = document.createElement('div');
          el.className = 'order-card' + (order.status === 'Ready' ? ' completed' : '');
          el.dataset.id = id;
          el.innerHTML = buildCardHTML(order);
          el.style.opacity = '0';
          el.style.transform = 'translateY(10px)';
          el.style.transition = 'none';

          // Insert at correct position
          const cards = container.querySelectorAll('.order-card[data-id]');
          if (idx < cards.length) {
            container.insertBefore(el, cards[idx]);
          } else {
            container.appendChild(el);
          }

          // Trigger slide-in on next frame
          requestAnimationFrame(() => {
            el.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
            el.style.opacity = '1';
            el.style.transform = 'translateY(0)';
          });

          renderedOrders.set(id, { fp, status: order.status });

        } else if (renderedOrders.get(id)?.fp !== fp) {
          // Card exists but data changed — patch only the changed inner HTML
          existing.className = 'order-card' + (order.status === 'Ready' ? ' completed' : '');
          existing.innerHTML = buildCardHTML(order);
          renderedOrders.set(id, { fp, status: order.status });
        }
        // else: identical — touch nothing, zero flicker
      });
    }

    // ─── Main AJAX poll ──────────────────────────────────────────────────────
    function pollOrders() {
      const ring = document.getElementById('refresh-ring');
      ring.classList.add('active');

      fetch('/chef_orders_api')
        .then(res => res.json())
        .then(data => {
          ring.classList.remove('active');

          const pending = [], completed = [];
          let pendingCount = 0, completedCount = 0, totalRevenue = 0;

          data.orders.forEach(order => {
            totalRevenue += parseFloat(order.total) || 0;
            if (order.status !== 'Ready') { pending.push(order); pendingCount++; }
            else { completed.push(order); completedCount++; }
          });

          reconcileColumn('pending', pending);
          reconcileColumn('completed', completed);

          // Update stats (text-only, no flicker)
          document.getElementById('pending-count').textContent = pendingCount;
          document.getElementById('completed-count').textContent = completedCount;
          document.getElementById('stat-pending').textContent = pendingCount;
          document.getElementById('stat-completed').textContent = completedCount;
          document.getElementById('stat-total').textContent = data.orders.length;
          document.getElementById('stat-revenue').textContent = '₹' + Math.round(totalRevenue).toLocaleString('en-IN');
        })
        .catch(() => ring.classList.remove('active'));
    }

    // ─── Mark ready ──────────────────────────────────────────────────────────
    function markReady(orderId) {
      fetch(`/mark_ready/${orderId}`, { method: 'POST' })
        .then(res => res.json())
        .then(data => {
          if (data.success) pollOrders();
          else alert(data.error || 'Unable to update order status');
        })
        .catch(() => alert('Unable to update order status. Please try again.'));
    }

    // ─── Start polling ───────────────────────────────────────────────────────
    setInterval(pollOrders, 3000);
    pollOrders();
  </script>

</body>
</html>
