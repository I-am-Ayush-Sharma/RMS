<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
  /* Backgrounds */
  --color-background-primary: #FFFFFF;
  --color-background-secondary: #F7F7FB;

  /* Text */
  --color-text-primary: #2D2D34;
  --color-text-secondary: #6F6F7B;

  /* Borders */
  --color-border-secondary: #E4E4EA;
  --color-border-tertiary: #EFEFF4;

  /* Radius */
  --border-radius-lg: 16px;
  --border-radius-md: 10px;
}

  body {
    background: #F3F4F8;
  }

  .dash-wrap {
    min-height: 420px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1rem;
    font-family: 'DM Sans', sans-serif;
  }

  .dash-card {
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    padding: 2.5rem 2rem 2rem;
    width: 100%;
    max-width: 380px;
  }

  .dash-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--color-text-primary);
    margin: 0 0 0.2rem;
    letter-spacing: -0.3px;
  }

  .dash-subtitle {
    font-size: 13px;
    color: var(--color-text-secondary);
    margin: 0 0 2rem;
  }

  .accent-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #7F77DD;
    margin-right: 6px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  .nav-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 13px 16px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    text-decoration: none;
    color: var(--color-text-primary);
    font-size: 14px;
    font-weight: 500;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
  }

  .nav-item:hover {
    border-color: #7F77DD;
    background: var(--color-background-primary);
  }

  .nav-item:active {
    transform: scale(0.98);
  }

  .nav-icon {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .nav-icon.purple { background: #EEEDFE; }
  .nav-icon.teal   { background: #E1F5EE; }
  .nav-icon.coral  { background: #FAECE7; }

  .nav-icon svg { width: 16px; height: 16px; }

  .nav-desc {
    font-size: 12px;
    font-weight: 400;
    color: var(--color-text-secondary);
    margin-top: 1px;
  }

  .nav-text { flex: 1; }
  .nav-arrow { color: var(--color-text-secondary); font-size: 14px; }

  .divider {
    height: 0.5px;
    background: var(--color-border-tertiary);
    margin: 1.75rem 0 1.25rem;
  }

  .dash-footer {
    font-size: 12px;
    color: var(--color-text-secondary);
    text-align: center;
  }
</style>

<div class="dash-wrap">
  <div class="dash-card">
    <h2>Admin Dashboard</h2>
    <p class="dash-subtitle"><span class="accent-dot"></span>Manage your menu and orders</p>

    <div class="nav-list">
      <a href="/add_menu" class="nav-item">
        <div class="nav-icon purple">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 3v10M3 8h10" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="nav-text">
          <div>Add Menu</div>
          <div class="nav-desc">Create a new menu item</div>
        </div>
        <span class="nav-arrow">›</span>
      </a>

      <a href="/menu" class="nav-item">
        <div class="nav-icon teal">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="3" width="12" height="1.5" rx="0.75" fill="#0F6E56"/>
            <rect x="2" y="7" width="9" height="1.5" rx="0.75" fill="#0F6E56"/>
            <rect x="2" y="11" width="11" height="1.5" rx="0.75" fill="#0F6E56"/>
          </svg>
        </div>
        <div class="nav-text">
          <div>View Menu</div>
          <div class="nav-desc">Browse all menu items</div>
        </div>
        <span class="nav-arrow">›</span>
      </a>

      <a href="/admin/orders" class="nav-item">
        <div class="nav-icon coral">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="2" width="10" height="12" rx="1.5" stroke="#993C1D" stroke-width="1.3"/>
            <path d="M5.5 6h5M5.5 9h3" stroke="#993C1D" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        
        <div class="nav-text">
          <div>View Orders</div>
          <div class="nav-desc">Track incoming orders</div>
        </div>
        <span class="nav-arrow">›</span>
      </a>
    </div>

    <div class="divider"></div>
    <p class="dash-footer">Admin panel &nbsp;·&nbsp; All actions are logged</p>
  </div>
</div>
