<!-- admin.html — La Maison · matches theme -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />

<style>
  :root {
    --gold:     #c9a84c;
    --gold-lt:  #e8c97a;
    --cream:    #f5efe4;
    --ink:      #1a1612;
    --charcoal: #231f1b;
    --card-bg:  #211d19;
    --muted:    #8a7f72;
    --border:   rgba(201,168,76,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    font-family: 'Jost', sans-serif;
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.04;
    pointer-events: none;
  }

  /* ── NAV ── */
  .top-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 40px;
    background: rgba(26,22,18,0.92);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(16px);
  }
  .nav-brand {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.55rem;
    font-weight: 300;
    color: var(--gold-lt);
    text-decoration: none;
  }
  .nav-badge {
    font-size: 0.62rem;
    font-weight: 200;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 4px 12px;
  }

  /* ── PAGE ── */
  .page {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px 80px;
    gap: 40px;
  }

  /* ── HEADER ── */
  .page-header {
    text-align: center;
    animation: fadeUp 0.8s ease 0.1s both;
  }
  .page-eyebrow {
    font-size: 0.68rem;
    font-weight: 200;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .page-header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.2rem, 5vw, 3.6rem);
    color: var(--cream);
    line-height: 1;
  }
  .page-header h1 em { font-style: italic; color: var(--gold-lt); }
  .header-rule {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 18px;
  }
  .header-rule span {
    display: block; width: 60px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--border));
  }
  .header-rule span:last-child { background: linear-gradient(90deg, var(--border), transparent); }
  .header-rule i { display: block; width: 4px; height: 4px; background: var(--gold); transform: rotate(45deg); opacity: 0.6; }

  /* ── NAV CARDS ── */
  .nav-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.8s ease 0.25s both;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 18px 22px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    text-decoration: none;
    color: var(--cream);
    transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
    position: relative;
    overflow: hidden;
  }
  .nav-item::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--gold);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.3s ease;
  }
  .nav-item:hover {
    border-color: rgba(201,168,76,0.45);
    transform: translateX(4px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .nav-item:hover::after { transform: scaleY(1); }

  .nav-icon {
    width: 42px;
    height: 42px;
    border-radius: 0;
    border: 1px solid var(--border);
    background: rgba(201,168,76,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.3s, border-color 0.3s;
  }
  .nav-item:hover .nav-icon {
    background: rgba(201,168,76,0.12);
    border-color: rgba(201,168,76,0.4);
  }
  .nav-icon svg { width: 18px; height: 18px; }

  .nav-text { flex: 1; }
  .nav-label {
    font-size: 0.88rem;
    font-weight: 300;
    color: var(--cream);
    letter-spacing: 0.04em;
    transition: color 0.25s;
  }
  .nav-item:hover .nav-label { color: var(--gold-lt); }
  .nav-desc {
    font-size: 0.7rem;
    font-weight: 200;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.06em;
  }

  .nav-arrow {
    color: var(--muted);
    font-size: 1rem;
    transition: color 0.25s, transform 0.25s;
  }
  .nav-item:hover .nav-arrow { color: var(--gold); transform: translateX(3px); }

  /* ── FOOTER ── */
  .dash-footer {
    font-size: 0.68rem;
    font-weight: 200;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-align: center;
    animation: fadeUp 0.8s ease 0.4s both;
  }
  .dash-footer span { color: rgba(201,168,76,0.4); margin: 0 8px; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { transform: translateY(18px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
</style>

<!-- ══════════════════════ NAV -->
<nav class="top-nav">

  <span class="nav-badge">Admin Panel</span>
</nav>
