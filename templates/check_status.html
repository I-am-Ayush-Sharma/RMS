<h2>🔍 Check Order Status</h2>

<form method="GET" action="/order_status">
  <input type="number" name="order_id" placeholder="Enter Order ID" required>
  <button type="submit">Check</button>
</form>

<hr>

{% if order %}

  <h3>Order ID: #{{ order[0] }}</h3>

  <p><b>Total:</b> ₹{{ order[3] }}</p>
  <p><b>Time:</b> {{ order[4] }}</p>

  <p>
    <b>Status:</b>
    {% if order[5] == "Ready" %}
      <span style="color:green;">🟢 Ready</span>
    {% else %}
      <span style="color:orange;">🟡 Preparing</span>
    {% endif %}
  </p>

  <br>
  <a href="/order_status">
    <button>⬅ Back</button>
  </a>

{% endif %}
