<h2>Place Order</h2>

<form method="POST">
    Select Item:
    <select name="item_id">
        {% for item in items %}
            <option value="{{item[0]}}">
                {{item[1]}} - ₹{{item[2]}}
            </option>
        {% endfor %}
    </select>
    
    <br><br>
    Quantity:
    <input type="number" name="quantity" required>
    
    <br><br>
    <button>Order</button>
</form>
