<!DOCTYPE html>
<html>
<head>
  <title>Welcome</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      color: #b91c1c;
      margin-bottom: 30px;
    }

    .btn {
      display: block;
      width: 220px;
      margin: 10px auto;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      transition: 0.2s;
    }

    .menu-btn {
      background: #16a34a;
    }

    .menu-btn:hover {
      background: #15803d;
    }

    .status-btn {
      background: #2563eb;
    }

    .status-btn:hover {
      background: #1d4ed8;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🍽️ Welcome to Our Restaurant</h1>

    <a href="/menu" class="btn menu-btn">View Menu</a>

    <a href="/order_status">Check Order Status</a>
  </div>

</body>
</html>
