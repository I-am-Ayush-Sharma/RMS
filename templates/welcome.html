<!doctype html>
<html>
  <head>
    <title>Welcome — La Maison</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --gold: #c9a84c;
        --gold-lt: #e8c97a;
        --cream: #f5efe4;
        --ink: #1a1612;
        --charcoal: #231f1b;
        --muted: #8a7f72;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
        background: var(--ink);
        font-family: "Jost", sans-serif;
        color: var(--cream);
        cursor: default;
      }

      /* ── CANVAS BACKGROUND ── */
      #bg-canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
      }

      /* ── GRAIN OVERLAY ── */
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 1;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
        opacity: 0.04;
        pointer-events: none;
      }

      /* ── RADIAL VIGNETTE ── */
      .vignette {
        position: fixed;
        inset: 0;
        z-index: 2;
        background: radial-gradient(
          ellipse at center,
          transparent 40%,
          rgba(10, 8, 6, 0.85) 100%
        );
        pointer-events: none;
      }

      /* ── LAYOUT ── */
      .stage {
        position: relative;
        z-index: 10;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        padding: 2rem;
        text-align: center;
      }

      /* ── ORNAMENT ── */
      .ornament {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 28px;
        opacity: 0;
        animation: fadeUp 1s ease 0.2s forwards;
      }
      .ornament-line {
        width: 60px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold));
      }
      .ornament-line.right {
        background: linear-gradient(90deg, var(--gold), transparent);
      }
      .ornament svg {
        width: 22px;
        height: 22px;
        fill: var(--gold);
        opacity: 0.9;
      }

      /* ── EYEBROW ── */
      .eyebrow {
        font-family: "Jost", sans-serif;
        font-weight: 200;
        font-size: 0.7rem;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 16px;
        opacity: 0;
        animation: fadeUp 1s ease 0.35s forwards;
      }

      /* ── HEADLINE ── */
      h1 {
        font-family: "Cormorant Garamond", serif;
        font-weight: 300;
        font-size: clamp(3.2rem, 8vw, 6.5rem);
        line-height: 1;
        letter-spacing: -0.01em;
        color: var(--cream);
        margin-bottom: 4px;
        opacity: 0;
        animation: fadeUp 1.1s ease 0.5s forwards;
      }
      h1 em {
        font-style: italic;
        font-weight: 300;
        color: var(--gold-lt);
      }

      /* ── SUBHEAD ── */
      .subhead {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-weight: 300;
        font-size: clamp(1rem, 2.5vw, 1.35rem);
        color: var(--muted);
        margin-top: 14px;
        margin-bottom: 52px;
        opacity: 0;
        animation: fadeUp 1s ease 0.7s forwards;
      }

      /* ── DIVIDER ── */
      .divider {
        width: 1px;
        height: 40px;
        background: linear-gradient(
          to bottom,
          var(--gold) 0%,
          transparent 100%
        );
        margin: 0 auto 52px;
        opacity: 0;
        animation: fadeIn 1s ease 0.9s forwards;
      }

      /* ── BUTTONS ── */
      .actions {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
        opacity: 0;
        animation: fadeUp 1s ease 1s forwards;
      }

      .btn {
        position: relative;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 15px 36px;
        font-family: "Jost", sans-serif;
        font-weight: 300;
        font-size: 0.78rem;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        text-decoration: none;
        border-radius: 0;
        transition: all 0.35s ease;
        overflow: hidden;
      }
      .btn::before {
        content: "";
        position: absolute;
        inset: 0;
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .btn:hover::before {
        transform: scaleX(1);
      }
      .btn span {
        position: relative;
        z-index: 1;
      }
      .btn svg {
        position: relative;
        z-index: 1;
        width: 14px;
        height: 14px;
        transition: transform 0.3s ease;
      }
      .btn:hover svg {
        transform: translateX(4px);
      }

      .btn-primary {
        background: var(--gold);
        color: var(--ink);
        border: 1px solid var(--gold);
      }
      .btn-primary::before {
        background: var(--gold-lt);
      }

      .btn-secondary {
        background: transparent;
        color: var(--cream);
        border: 1px solid rgba(201, 168, 76, 0.4);
      }
      .btn-secondary::before {
        background: rgba(201, 168, 76, 0.08);
      }
      .btn-secondary:hover {
        border-color: var(--gold);
        color: var(--gold-lt);
      }

      /* ── FOOTER BAR ── */
      .footer-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 20;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 40px;
        padding: 18px 40px;
        background: rgba(26, 22, 18, 0.85);
        border-top: 1px solid rgba(201, 168, 76, 0.12);
        backdrop-filter: blur(12px);
        opacity: 0;
        animation: fadeIn 1.2s ease 1.4s forwards;
      }
      .footer-info {
        font-size: 0.68rem;
        font-weight: 300;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .footer-dot {
        width: 3px;
        height: 3px;
        background: var(--gold);
        border-radius: 50%;
        opacity: 0.6;
      }

      /* ── POPUP ── */
      #popup {
        display: none;
        position: fixed;
        top: 24px;
        right: 24px;
        z-index: 1000;
        background: var(--charcoal);
        border: 1px solid var(--gold);
        color: var(--cream);
        padding: 16px 22px;
        font-size: 0.82rem;
        font-weight: 300;
        letter-spacing: 0.05em;
        border-radius: 2px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
        animation: slideIn 0.4s ease;
      }
      @keyframes slideIn {
        from {
          transform: translateX(20px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }
      @keyframes fadeUp {
        from {
          transform: translateY(22px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>
    <div class="vignette"></div>

    <div class="stage">
      <div class="ornament">
        <span class="ornament-line"></span>
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"
          />
          <!-- fork & knife icon replacement -->
        </svg>
        <!-- simple fleur-de-lis / diamond shape -->
        <svg viewBox="0 0 20 20">
          <path
            d="M10 1 L11.5 8 L18 10 L11.5 12 L10 19 L8.5 12 L2 10 L8.5 8 Z"
          />
        </svg>
        <span class="ornament-line right"></span>
      </div>

      <p class="eyebrow">Fine Dining &amp; Restaurant Management</p>

      <h1>La <em>Maison</em></h1>

      <p class="subhead">Where every table tells a story</p>

      <div class="divider"></div>

      <div class="actions">
        <a href="/menu" class="btn btn-primary">
          <span>Explore Menu</span>
          <svg viewBox="0 0 16 16" fill="currentColor">
            <path
              d="M1 8h12M9 4l4 4-4 4"
              stroke="currentColor"
              stroke-width="1.5"
              fill="none"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </a>
        <a href="/order_status" class="btn btn-secondary">
          <span>Track Order</span>
          <svg
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="8" cy="8" r="6" />
            <path d="M8 5v3.5l2 2" />
          </svg>
        </a>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer-bar">
      <span class="footer-info">
        <span class="footer-dot"></span>
        Open Daily · 12pm – 11pm
      </span>
      <span class="footer-info">
        <span class="footer-dot"></span>
        Reservations: +91 98765 43210
      </span>
      <span class="footer-info">
        <span class="footer-dot"></span>
        Table 1 – 32 Available
      </span>
    </div>

    <!-- Popup (kept from original) -->
    <div id="popup">
      <span id="popup-msg"></span>
    </div>





    <button
      id="enableSound"
      style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 10px 15px;
        background: #16a34a;
        color: white;
        border: none;
        border-radius: 6px;
        z-index: 2000;
      "
    >
      🔊 Enable Sound
    </button>

    <script>
      /* ── PARTICLE / EMBER CANVAS ── */
      const canvas = document.getElementById("bg-canvas");
      const ctx = canvas.getContext("2d");

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      const PARTICLE_COUNT = 55;
      const particles = [];

      function rand(a, b) {
        return a + Math.random() * (b - a);
      }

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push({
          x: rand(0, window.innerWidth),
          y: rand(0, window.innerHeight),
          r: rand(0.4, 2.2),
          vx: rand(-0.15, 0.15),
          vy: rand(-0.35, -0.08),
          life: rand(0, 1),
          maxLife: rand(0.5, 1),
          hue: rand(30, 50),
          sat: rand(70, 100),
          lum: rand(55, 80),
        });
      }

      function drawBackground() {
        const grad = ctx.createRadialGradient(
          canvas.width * 0.5,
          canvas.height * 0.45,
          0,
          canvas.width * 0.5,
          canvas.height * 0.5,
          canvas.width * 0.75,
        );
        grad.addColorStop(0, "#2c2318");
        grad.addColorStop(0.5, "#1c1813");
        grad.addColorStop(1, "#100e0b");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }

      function tick() {
        drawBackground();

        particles.forEach((p) => {
          p.life += 0.004;
          if (p.life > p.maxLife) {
            p.life = 0;
            p.x = rand(canvas.width * 0.2, canvas.width * 0.8);
            p.y = canvas.height + 10;
          }
          p.x += p.vx + Math.sin(p.life * 3) * 0.3;
          p.y += p.vy;

          const alpha = Math.sin((p.life / p.maxLife) * Math.PI) * 0.6;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${p.hue}, ${p.sat}%, ${p.lum}%, ${alpha})`;
          ctx.fill();
        });

        requestAnimationFrame(tick);
      }
      tick();

      /* ── RELOAD (kept from original) ── */
      const enableSoundBtn = document.getElementById("enableSound");
      let audioEnabled = false;
      let pendingSpeech = null;
      let lastNotified = localStorage.getItem("lastNotifiedOrder");

      function speak(msg) {
        if (!window.speechSynthesis || !window.SpeechSynthesisUtterance) return;

        const utterance = new SpeechSynthesisUtterance(msg);
        utterance.lang = "en-IN";
        utterance.rate = 1;
        utterance.pitch = 1;
        window.speechSynthesis.speak(utterance);
      }

      if (enableSoundBtn) {
        if (!window.speechSynthesis || !window.SpeechSynthesisUtterance) {
          enableSoundBtn.style.display = "none";
        } else {
          enableSoundBtn.addEventListener("click", () => {
            audioEnabled = true;
            enableSoundBtn.style.display = "none";
            if (pendingSpeech) {
              speak(pendingSpeech);
              pendingSpeech = null;
            }
            speak("Voice announcements enabled.");
          });
        }
      }

      function notifySpeech(msg) {
        if (audioEnabled) {
          speak(msg);
        } else {
          pendingSpeech = msg;
        }
      }

      function checkLatest() {
        fetch("/latest_order_api")
          .then((res) => res.json())
          .then((data) => {
            if (!data.id) return;

            if (data.status === "Ready" && data.id != lastNotified) {
              // 🔥 BOTH UPDATE
              localStorage.setItem("lastNotifiedOrder", data.id);
              lastNotified = data.id; // ✅ THIS LINE FIXES IT

              const announcement = `${data.name}, your order number ${data.id} is ready. Please collect from counter.`;
              showPopup(`${data.name}, your order #${data.id} is READY!`);
              notifySpeech(announcement);
            }
          });
      }
      function showPopup(msg) {
        let box = document.getElementById("popup");
        let text = document.getElementById("popup-msg");

        if (!box || !text) {
          console.log("Popup elements not found ❌");
          return;
        }

        text.innerText = msg;
        box.style.display = "block";

        setTimeout(() => {
          box.style.display = "none";
        }, 5000);
      }
      // 🔥 only API call, no reload
      setInterval(checkLatest, 3000);
      checkLatest();
    </script>
    {% if session.get('notify') %}
    <script>
      const initialNotifyMessage = {{ session.get('notify')|tojson }};
      showPopup(initialNotifyMessage);
      notifySpeech(initialNotifyMessage);
    </script>
    {% set _ = session.pop('notify') %} {% endif %}
  </body>
</html>
